name: EKS & Multi-Registry Integrated CI/CD

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO_F: ${{ secrets.ECR_REPOSITORY_FASTAPI }}
          ECR_REPO_N: ${{ secrets.ECR_REPOSITORY_NGINX }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DH_REPO_F: ${{ secrets.DOCKER_REPOSITORY_FASTAPI }}
          DH_REPO_N: ${{ secrets.DOCKER_REPOSITORY_NGINX }}
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Starting build for tag: v$SHORT_SHA"

          # 1. FastAPI 빌드 및 푸시
          # ECR용: registry/st7/fastapi:vXXXX
          # DockerHub용: soyoung0/fastapi:latest
          docker build -t $ECR_REGISTRY/$ECR_REPO_F:latest \
                       -t $ECR_REGISTRY/$ECR_REPO_F:v$SHORT_SHA \
                       -t $DOCKER_USER/$DH_REPO_F:latest ./eks/fastapi
          
          docker push $ECR_REGISTRY/$ECR_REPO_F --all-tags
          docker push $DOCKER_USER/$DH_REPO_F:latest

          # 2. Nginx 빌드 및 푸시
          docker build -t $ECR_REGISTRY/$ECR_REPO_N:latest \
                       -t $ECR_REGISTRY/$ECR_REPO_N:v$SHORT_SHA \
                       -t $DOCKER_USER/$DH_REPO_N:latest ./eks/nginx
          
          docker push $ECR_REGISTRY/$ECR_REPO_N --all-tags
          docker push $DOCKER_USER/$DH_REPO_N:latest

      - name: Update Kubernetes Manifests
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          sed -i "s|DB_HOST_VALUE|${{ secrets.DB_HOST }}|g" k8s/deployment-svc.yaml
          sed -i "s|DB_USER_VALUE|${{ secrets.DB_USER }}|g" k8s/deployment-svc.yaml
          sed -i "s|DB_PASS_VALUE|${{ secrets.DB_PASS }}|g" k8s/deployment-svc.yaml
          sed -i "s|DB_NAME_VALUE|${{ secrets.DB_NAME }}|g" k8s/deployment-svc.yaml
          sed -i "s|ACM_ARN_VALUE|${{ secrets.ACM_ARN }}|g" k8s/deployment-svc.yaml
          sed -i "s|<AWS_ACCOUNT_ID>|${{ secrets.AWS_ACCOUNT_ID }}|g" k8s/deployment-svc.yaml

          sed -i "s|:latest|:v$SHORT_SHA|g" k8s/deployment-svc.yaml
          sed -i "s|:v[0-9a-f]\{7\}|:v$SHORT_SHA|g" k8s/deployment-svc.yaml

      - name: Commit and Push to Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment-svc.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            git commit -m "Auto-deploy: update manifests to v$SHORT_SHA [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi